name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies with retry
        run: |
          # Configure yarn for better network handling
          yarn config set network-timeout 300000
          yarn config set registry https://registry.npmjs.org/

          # Retry installation up to 3 times
          for i in {1..3}; do
            echo "Installation attempt $i..."
            if yarn install --frozen-lockfile; then
              echo "Installation successful on attempt $i"
              break
            else
              echo "Installation failed on attempt $i"
              if [ $i -eq 3 ]; then
                echo "All installation attempts failed"
                exit 1
              fi
              echo "Waiting 10 seconds before retry..."
              sleep 10
            fi
          done

      - name: Run ESLint
        run: yarn lint

  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies with retry
        run: |
          # Configure yarn for better network handling
          yarn config set network-timeout 300000
          yarn config set registry https://registry.npmjs.org/

          # Retry installation up to 3 times
          for i in {1..3}; do
            echo "Installation attempt $i..."
            if yarn install --frozen-lockfile; then
              echo "Installation successful on attempt $i"
              break
            else
              echo "Installation failed on attempt $i"
              if [ $i -eq 3 ]; then
                echo "All installation attempts failed"
                exit 1
              fi
              echo "Waiting 10 seconds before retry..."
              sleep 10
            fi
          done

      - name: Run vue-tsc type check
        run: yarn type-check

  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies with retry
        run: |
          # Configure yarn for better network handling
          yarn config set network-timeout 300000
          yarn config set registry https://registry.npmjs.org/

          # Retry installation up to 3 times
          for i in {1..3}; do
            echo "Installation attempt $i..."
            if yarn install --frozen-lockfile; then
              echo "Installation successful on attempt $i"
              break
            else
              echo "Installation failed on attempt $i"
              if [ $i -eq 3 ]; then
                echo "All installation attempts failed"
                exit 1
              fi
              echo "Waiting 10 seconds before retry..."
              sleep 10
            fi
          done

      - name: Run unit tests
        run: yarn test:run

  security:
    name: Security Audit
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies with retry
        run: |
          # Configure yarn for better network handling
          yarn config set network-timeout 300000
          yarn config set registry https://registry.npmjs.org/

          # Retry installation up to 3 times
          for i in {1..3}; do
            echo "Installation attempt $i..."
            if yarn install --frozen-lockfile; then
              echo "Installation successful on attempt $i"
              break
            else
              echo "Installation failed on attempt $i"
              if [ $i -eq 3 ]; then
                echo "All installation attempts failed"
                exit 1
              fi
              echo "Waiting 10 seconds before retry..."
              sleep 10
            fi
          done

      - name: Run yarn audit (Critical only)
        run: |
          yarn audit --level critical --json > audit.json || true
          # Critical が含まれているか判定
          if grep -q '"severity":"critical"' audit.json; then
            echo "Critical vulnerabilities found!"
            exit 1
          else
            echo "No critical vulnerabilities found. PASS."
          fi

  build:
    name: Build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies with retry
        run: |
          # Configure yarn for better network handling
          yarn config set network-timeout 300000
          yarn config set registry https://registry.npmjs.org/

          # Retry installation up to 3 times
          for i in {1..3}; do
            echo "Installation attempt $i..."
            if yarn install --frozen-lockfile; then
              echo "Installation successful on attempt $i"
              break
            else
              echo "Installation failed on attempt $i"
              if [ $i -eq 3 ]; then
                echo "All installation attempts failed"
                exit 1
              fi
              echo "Waiting 10 seconds before retry..."
              sleep 10
            fi
          done

      - name: Build application
        run: yarn build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .output/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies with retry
        run: |
          # Configure yarn for better network handling
          yarn config set network-timeout 300000
          yarn config set registry https://registry.npmjs.org/

          # Retry installation up to 3 times
          for i in {1..3}; do
            echo "Installation attempt $i..."
            if yarn install --frozen-lockfile; then
              echo "Installation successful on attempt $i"
              break
            else
              echo "Installation failed on attempt $i"
              if [ $i -eq 3 ]; then
                echo "All installation attempts failed"
                exit 1
              fi
              echo "Waiting 10 seconds before retry..."
              sleep 10
            fi
          done

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .output/

      - name: Install Playwright browsers
        run: yarn test:e2e:install

      - name: Install Playwright system dependencies
        run: npx playwright install-deps

      - name: Run Playwright tests
        run: yarn test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies with retry
        run: |
          # Configure yarn for better network handling
          yarn config set network-timeout 300000
          yarn config set registry https://registry.npmjs.org/

          # Retry installation up to 3 times
          for i in {1..3}; do
            echo "Installation attempt $i..."
            if yarn install --frozen-lockfile; then
              echo "Installation successful on attempt $i"
              break
            else
              echo "Installation failed on attempt $i"
              if [ $i -eq 3 ]; then
                echo "All installation attempts failed"
                exit 1
              fi
              echo "Waiting 10 seconds before retry..."
              sleep 10
            fi
          done

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .output/

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  cleanup:
    name: Cleanup Artifacts
    runs-on: ubuntu-24.04
    needs: [build, e2e-tests, codeql]
    if: always() && needs.build.result == 'success'
    permissions:
      actions: write

    steps:
      - name: Delete build artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub REST APIを使用してアーティファクトを削除
          ARTIFACT_NAME="build-output"

          # アーティファクトIDを取得
          REPO="${{ github.repository }}"
          RUN_ID="${{ github.run_id }}"
          API_URL="https://api.github.com/repos/${REPO}"

          # アーティファクト一覧を取得（エラーハンドリング付き）
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API_URL}/actions/runs/${RUN_ID}/artifacts")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Failed to fetch artifacts (HTTP ${HTTP_CODE})"
            echo "Skipping artifact deletion."
            exit 0
          fi

          # この実行の中で指定された名前のアーティファクトIDを取得
          # (同じrun_idの中では同じ名前のアーティファクトは1つのみ)
          ARTIFACT_ID=$(echo "$BODY" | \
            jq -r ".artifacts[] | \
              select(.name == \"${ARTIFACT_NAME}\") | .id" | head -n1)

          if [ -n "$ARTIFACT_ID" ] && [ "$ARTIFACT_ID" != "null" ]; then
            echo "Deleting artifact ${ARTIFACT_NAME} (ID: ${ARTIFACT_ID})..."
            DELETE_CODE=$(curl -s -w "%{http_code}" -o /dev/null \
              -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${API_URL}/actions/artifacts/${ARTIFACT_ID}")

            if [ "$DELETE_CODE" -eq 204 ]; then
              echo "Artifact deleted successfully."
            else
              echo "Failed to delete artifact (HTTP ${DELETE_CODE})"
              echo "Continuing anyway (failOnError: false)"
            fi
          else
            echo "Artifact ${ARTIFACT_NAME} not found. Skipping deletion."
          fi
